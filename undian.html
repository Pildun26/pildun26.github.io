<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Undian 🎡 PILDUN 26</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Noto+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎡</text></svg>">
  <style>
    .draw-header { padding: 36px 0 20px; border-bottom: 1px solid var(--grey-dark); }
    .draw-title { font-family: var(--font-display); font-size: clamp(30px, 6vw, 52px); }
    .draw-sub { color: var(--grey); font-size: 14px; margin-top: 6px; }
    .draw-main { padding: 32px 0 64px; }

    .pot-tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .pot-tab {
      font-family: var(--font-body); font-weight: 700; font-size: 13.5px;
      background: var(--black-2); color: var(--grey);
      border: 1px solid var(--grey-dark); border-radius: var(--radius-26);
      padding: 10px 20px; cursor: pointer; transition: all .15s;
    }
    .pot-tab.active { background: var(--white); color: var(--black); border-color: var(--white); }
    .pot-tab .pot-progress { font-weight: 400; font-size: 11.5px; opacity: .75; margin-left: 6px; }

    .draw-layout { display: grid; grid-template-columns: minmax(0, 560px) 1fr; gap: 36px; align-items: start; }
    @media (max-width: 900px) { .draw-layout { grid-template-columns: 1fr; } }

    /* Roda */
    .wheel-box { position: relative; text-align: center; }
    .wheel-wrap { position: relative; display: inline-block; max-width: 100%; }
    #wheel { width: 100%; max-width: 540px; height: auto; display: block; }
    .wheel-pointer {
      position: absolute; top: -6px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0; border-left: 16px solid transparent; border-right: 16px solid transparent;
      border-top: 26px solid var(--gold-bright); z-index: 3;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,.6));
    }
    .wheel-hub {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 92px; height: 92px; border-radius: 50%;
      background: var(--black); border: 3px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-size: 38px; z-index: 2;
    }

    .turn-box { margin: 22px 0 14px; }
    .turn-label { font-size: 12px; letter-spacing: .2em; text-transform: uppercase; color: var(--grey); }
    .turn-name { font-family: var(--font-display); font-size: clamp(24px, 4vw, 36px); color: var(--gold-bright); }
    .turn-count { font-size: 13px; color: var(--grey); margin-top: 2px; }

    .btn-spin {
      font-family: var(--font-display); font-size: 18px; letter-spacing: .04em;
      background: linear-gradient(135deg, var(--gold), var(--gold-bright)); color: var(--black);
      border: none; border-radius: var(--radius-26);
      padding: 16px 52px; cursor: pointer; transition: transform .1s, opacity .15s;
    }
    .btn-spin:hover { transform: scale(1.03); }
    .btn-spin:disabled { opacity: .35; cursor: not-allowed; transform: none; }
    .btn-undo {
      display: block; margin: 14px auto 0; background: none; border: none;
      color: var(--grey); font-size: 12.5px; cursor: pointer; text-decoration: underline;
    }
    .btn-undo:hover { color: var(--white); }

    /* Panel hasil */
    .result-panel h2 { font-family: var(--font-display); font-size: 19px; margin-bottom: 4px; }
    .result-panel .rp-sub { font-size: 12.5px; color: var(--grey); margin-bottom: 16px; }
    .result-list { display: flex; flex-direction: column; gap: 6px; max-height: 480px; overflow-y: auto; padding-right: 4px; }
    .result-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--black-2); border: 1px solid var(--grey-dark);
      border-radius: 10px; padding: 8px 12px; font-size: 13.5px;
    }
    .result-row img { width: 28px; height: 19px; object-fit: cover; border-radius: 2px; }
    .result-row .rr-person { font-weight: 700; flex: 1; }
    .result-row .rr-team { color: var(--gold-bright); }
    .result-row.pending { opacity: .45; border-style: dashed; }
    .result-row.current { border-color: var(--gold); }
    .result-row .rr-num { color: var(--grey); font-size: 11.5px; width: 22px; }

    .export-box { margin-top: 22px; display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-export {
      font-weight: 700; font-size: 13px;
      background: var(--green); color: var(--black);
      border: none; border-radius: var(--radius-26); padding: 11px 20px; cursor: pointer;
    }
    .btn-reset {
      font-weight: 700; font-size: 13px;
      background: transparent; color: var(--red);
      border: 1px solid var(--red); border-radius: var(--radius-26); padding: 11px 20px; cursor: pointer;
    }
    #export-area {
      width: 100%; margin-top: 12px; min-height: 180px;
      background: var(--black-2); color: var(--white); border: 1px solid var(--grey-dark);
      border-radius: 10px; padding: 12px; font-family: monospace; font-size: 12px;
    }

    /* Modal hasil spin */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.82); z-index: 100;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-card {
      background: linear-gradient(160deg, #1d1709, var(--black-2) 60%);
      border: 1px solid var(--gold); border-radius: var(--radius-26);
      padding: 40px 48px; text-align: center; max-width: 440px; width: 100%;
      box-shadow: 0 0 60px rgba(182,151,105,.3);
      animation: pop .35s cubic-bezier(.2,1.6,.4,1);
    }
    @keyframes pop { from { transform: scale(.7); opacity: 0; } }
    .modal-card img { width: 120px; border-radius: 6px; box-shadow: 0 4px 20px rgba(0,0,0,.5); }
    .modal-card .m-team { font-family: var(--font-display); font-size: 30px; margin-top: 14px; }
    .modal-card .m-arrow { color: var(--grey); font-size: 13px; margin: 8px 0 2px; }
    .modal-card .m-person { font-family: var(--font-display); font-size: 22px; color: var(--gold-bright); }
    .modal-card button {
      margin-top: 22px; font-family: var(--font-body); font-weight: 700; font-size: 14px;
      background: var(--white); color: var(--black); border: none;
      border-radius: var(--radius-26); padding: 12px 32px; cursor: pointer;
    }
  </style>
</head>
<body>
  <header class="draw-header">
    <div class="container">
      <h1 class="draw-title">UNDIAN <span class="gold">PILDUN26</span> 🎡</h1>
      <p class="draw-sub">Halaman panitia. Pot 1: 25 orang ↔ 25 tim unggulan · Pot 2: 15 orang ↔ 23 tim hore-hore. Progres tersimpan otomatis di browser ini.</p>
    </div>
  </header>

  <main class="draw-main">
    <div class="container">
      <div class="pot-tabs">
        <button class="pot-tab active" data-pot="1">⭐ Pot 1 — Tim Unggulan <span class="pot-progress" id="prog-1"></span></button>
        <button class="pot-tab" data-pot="2">🎉 Pot 2 — Tim Hore-hore <span class="pot-progress" id="prog-2"></span></button>
      </div>

      <div class="draw-layout">
        <div class="wheel-box">
          <div class="wheel-wrap">
            <div class="wheel-pointer"></div>
            <div class="wheel-hub">⚽</div>
            <canvas id="wheel" width="1080" height="1080"></canvas>
          </div>
          <div class="turn-box">
            <div class="turn-label">Giliran Mengundi</div>
            <div class="turn-name" id="turn-name">—</div>
            <div class="turn-count" id="turn-count"></div>
          </div>
          <button class="btn-spin" id="btn-spin">PUTAR! 🎡</button>
          <button class="btn-undo" id="btn-undo" hidden>↩ Batalkan hasil terakhir</button>
        </div>

        <div class="result-panel">
          <h2 id="panel-title">HASIL UNDIAN</h2>
          <p class="rp-sub" id="panel-sub"></p>
          <div class="result-list" id="result-list"></div>
          <div class="export-box">
            <button class="btn-export" id="btn-export">📋 Salin participants.json</button>
            <button class="btn-reset" id="btn-reset">Reset semua</button>
          </div>
          <textarea id="export-area" hidden readonly></textarea>
        </div>
      </div>
    </div>
  </main>

  <script src="js/draw.js"></script>
</body>
</html>
