name: Update skor & klasemen

on:
  schedule:
    # Tiap 2 jam selama turnamen (11 Juni - 19 Juli 2026)
    - cron: '0 */2 * 6,7 *'
  workflow_dispatch: {} # bisa dipicu manual dari tab Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Jalankan pipeline data
        run: node scripts/update-data.js

      - name: Commit kalau ada perubahan
        run: |
          git config user.name "pildeon-bot"
          git config user.email "actions@github.com"
          git add data/standings.json data/fixtures-raw.json
          if git diff --cached --quiet; then
            echo "Tidak ada perubahan data."
          else
            git commit -m "data: update skor & klasemen otomatis"
            git push
          fi
